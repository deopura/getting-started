jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. Start SonarQube Server at runtime
    - name: Run SonarQube Server
      run: |
        docker run -d --name sonarqube -p 9000:9000 sonarqube:lts-community

    # 2. Wait for SonarQube to be ready (Critical)
    - name: Wait for SonarQube to be operational
      run: |
        echo "Waiting for SonarQube to start..."
        until $(curl -sSf http://localhost:9000/api/system/status | grep -q '"status":"UP"'); do
          printf '.'
          sleep 5
        done
        echo "SonarQube is UP"

    # 3. Perform the scan
    - name: SonarQube Scan
      run: |
        docker run --rm \
          --network="host" \
          -v "${{ github.workspace }}:/usr/src" \
          sonarsource/sonar-scanner-cli \
          -Dsonar.projectKey=test \
          -Dsonar.sources=. \
          -Dsonar.host.url="http://localhost:9000" \
          -Dsonar.login="admin" \
          -Dsonar.password="admin"

    # 4. Standard Build and Push (Existing steps)
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      run: |
        docker build . --file Dockerfile --tag ${{ secrets.DOCKERHUB_USERNAME }}/my-image-name:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-image-name:latest
